name: Linters

on: [push]

jobs:
  solhint:
    name: Solhint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Common setup
        uses: ./.github/workflows/setup

      - name: Run solhint
        run: yarn lint:sol

  eslint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Common setup
        uses: ./.github/workflows/setup

      - name: Run eslint
        run: yarn lint:ts

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Common setup
        uses: ./.github/workflows/setup

      - name: Generate typechain types
        run: yarn hardhat compile

      - name: Run typescript types check
        run: yarn typecheck

  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Common setup
        uses: ./.github/workflows/setup

      - name: Run format check
        run: yarn format

