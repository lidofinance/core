name: Integration Tests Scratch

on: [push]

jobs:
  test_hardhat_integration_scratch:
    name: Hardhat / Scratch
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NODE_OPTIONS: --max_old_space_size=10240
      SKIP_GAS_REPORT: true
      SKIP_CONTRACT_SIZE: true
      SKIP_INTERFACES_CHECK: true

    services:
      hardhat-node:
        image: ghcr.io/lidofinance/hardhat-node:2.28.0-scratch
        ports:
          - 8555:8545

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Common setup
        uses: ./.github/workflows/setup

      # https://github.com/foundry-rs/foundry-toolchain
      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0

      - name: Install just
        run: cargo install just

      - name: Set env
        run: cp .env.example .env

      - name: Run scratch deployment
        run: yarn test:integration:scratch
        env:
          NETWORK: "local"
          RPC_URL: "http://localhost:8555"
          INTEGRATION_WITH_CSM: "off"
