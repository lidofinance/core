name: Unit Tests

on: [push]

jobs:
  test_hardhat_unit:
    name: Hardhat
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Common setup
        uses: ./.github/workflows/setup

      - name: Run unit tests
        run: yarn test

  test_foundry_fuzzing:
    name: Foundry / Fuzzing & Invariants
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Common setup
        uses: ./.github/workflows/setup

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        # Use a specific version of Foundry in case nightly is broken
        # https://github.com/foundry-rs/foundry/releases
        # with:
        #   version: nightly-54d8510c0f2b0f791f4c5ef99866c6af99b7606a

      - name: Print forge version
        run: forge --version

      - name: Run fuzzing and invariant tests
        run: forge test -vvv
