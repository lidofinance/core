name: Integration Tests

on: [push]

jobs:
  test_hardhat_integration_fork:
    name: Hardhat / Hoodi
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NODE_OPTIONS: --max_old_space_size=10240
      SKIP_GAS_REPORT: true
      SKIP_CONTRACT_SIZE: true
      SKIP_INTERFACES_CHECK: true

    # services:
    #   hardhat-node:
    #     image: ghcr.io/lidofinance/hardhat-node:2.28.0-hoodi
    #     env:
    #       ETH_RPC_URL: ${{ secrets.HOODI_RPC_URL }}
    #     ports:
    #       - 8555:8545

    steps:
      - uses: actions/checkout@v4

      - name: Common setup
        uses: ./.github/workflows/setup

      - name: Run integration tests
        run: yarn test:integration:upgrade
        env:
          NETWORK: "hoodi"
          # RUN_NETWORK: "local"
          # HOLDER: "0xD500a8aDB182F55741E267730dfbfb4F1944C205"
          RPC_URL: "${{ secrets.HOODI_RPC_URL }}"
          FORKING_BLOCK_NUMBER: "3003000"
          NETWORK_STATE_FILE: deployed-hoodi.json
