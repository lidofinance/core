{
  "override_base_config": "certora/confs/vaults/VaultHub.conf",
  "rule": "vaultIsHealtyhUntilReport",
  "method": [
    "rebalance(address,uint256)",
    "burnShares(address,uint256)",
    "disconnect(address)",
    "forceRebalance(address)"
  ],
  "disallow_internal_function_calls": false, 
  "build_cache": true,
  "optimistic_fallback": true,
  "optimistic_hashing": true,
  // Needs more than the default 98 for _collectAndCheckConfirmations which
  // hashes the calldata to OperatorGrid.changeTier
  "optimistic_loop": true,
  "loop_iter": "2",
  "rule_sanity": "basic",
  "verify": "VaultHubHarness:certora/specs/vaults/VaultHub_health.spec",
  "msg": "verify VaultHub part 5"
}
