{
  "override_base_config": "certora/confs/vaults/VaultHub.conf",
  "build_cache": true,
  "optimistic_fallback": true,
  "optimistic_hashing": true,
  "optimistic_loop": true,
  "loop_iter": "1",
  "rule_sanity": "basic",
  "disallow_internal_function_calls": true,
  "verify": "VaultHubHarness:certora/specs/vaults/shortfall.spec",
  "msg": "verify VaultHub shortfall integrity",
  "nondet_difficult_funcs": true,
  "smt_timeout": "600",
  "prover_args": ["-mediumTimeout 30", "-depth 15", "-smt_nonLinearArithmetic true"]
}
