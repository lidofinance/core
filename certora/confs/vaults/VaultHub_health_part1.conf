{
  "override_base_config": "certora/confs/vaults/VaultHub.conf",
  "method": [
    "requestValidatorExit(address,bytes)",
    "getVaultRecordInOutDelta(address,uint48)",
    "internalizeBadDebt(address,uint256)",
    "setLiabilitySharesTarget(address,uint256)",
    "transferVaultOwnership(address,address)",
    "resume()",
    "pauseFor(uint256)",
    "decreaseInternalizedBadDebt(uint256)",
    "pauseUntil(uint256)",
    "resumeBeaconChainDeposits(address)",
    "getVaultRecordBothDeltas(address)",
    "initialize(address)",
    "connectVault(address)",
    "pauseBeaconChainDeposits(address)",
    "grantRole(bytes32,address)",
    "revokeRole(bytes32,address)",
    "renounceRole(bytes32,address)",
    "proveUnknownValidatorToPDG(address,(bytes32[],bytes,uint256,uint64,uint64,uint64))",
    "collectERC20FromVault(address,address,address,uint256)",
    "socializeBadDebt(address,address,uint256)"
  ],
  "disallow_internal_function_calls": false, 
  "build_cache": true,
  "optimistic_fallback": true,
  "optimistic_hashing": true,
  // Needs more than the default 98 for _collectAndCheckConfirmations which
  // hashes the calldata to OperatorGrid.changeTier
  "hashing_length_bound": "500",
  "optimistic_loop": true,
  "loop_iter": "2",
  "rule_sanity": "basic",
  "verify": "VaultHubHarness:certora/specs/vaults/VaultHub_health.spec",
  "smt_timeout": "7200",
  "msg": "verify VaultHub health part 1"
}
