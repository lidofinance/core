{
    "files": [
        "certora/harness/LidoHarness.sol",
        "certora/harness/AccountingHarness.sol",
        "contracts/0.8.9/Burner.sol",
        "contracts/0.8.9/sanity_checks/OracleReportSanityChecker.sol",
        "contracts/0.8.9/LidoLocator.sol",
        "contracts/0.8.9/LidoExecutionLayerRewardsVault.sol",
        "contracts/0.8.9/WithdrawalVault.sol",
        "certora/mocks/WithdrawalQueueMock.sol"
    ],
    "link": [
        "AccountingHarness:LIDO_LOCATOR=LidoLocator",
        "AccountingHarness:LIDO=LidoHarness",
        "Burner:LIDO=LidoHarness",
        "Burner:LOCATOR=LidoLocator",
        "LidoLocator:accounting=AccountingHarness",
        "LidoLocator:burner=Burner",
        "LidoLocator:elRewardsVault=LidoExecutionLayerRewardsVault",
        "LidoLocator:withdrawalVault=WithdrawalVault",
        "LidoLocator:withdrawalQueue=WithdrawalQueueMock",
        "LidoExecutionLayerRewardsVault:LIDO=LidoHarness",
        "LidoLocator:oracleReportSanityChecker=OracleReportSanityChecker",
        "WithdrawalVault:LIDO=LidoHarness"
    ],
    "packages": [
        "@aragon/minime=node_modules/@aragon/minime",
        "@aragon/apps-agent=node_modules/@aragon/apps-agent",
        "@aragon/id=node_modules/@aragon/id",
        "@openzeppelin/contracts-v5.2=node_modules/@openzeppelin/contracts-v5.2",
        "solhint=node_modules/solhint",
        "openzeppelin-solidity=node_modules/openzeppelin-solidity",
        "@aragon/os=node_modules/@aragon/os",
        "@aragon/apps-finance=node_modules/@aragon/apps-finance",
        "@openzeppelin/contracts=node_modules/@openzeppelin/contracts",
        "@aragon/apps-lido=node_modules/@aragon/apps-lido",
        "@openzeppelin/contracts-v4.4=node_modules/@openzeppelin/contracts-v4.4",
        "solhint-plugin-lido=node_modules/solhint-plugin-lido",
        "@aragon/apps-vault=node_modules/@aragon/apps-vault",
        "@openzeppelin/merkle-tree=node_modules/@openzeppelin/merkle-tree"
    ],
    "server": "prover",
    "global_timeout": "7200",
    "smt_timeout": "7200",
    "disallow_internal_function_calls": true, // speedup compilation
    "build_cache": true,
    "optimistic_fallback": true,
    "optimistic_hashing": true,
    "hashing_length_bound": "98",
    "optimistic_loop": true,
    "loop_iter": "2",
    "compiler_map": {
        "LidoHarness": "solc4.24",
        "AccountingHarness": "solc8.9",
        "Burner": "solc8.9",
        "OracleReportSanityChecker": "solc8.9",
        "LidoLocator": "solc8.9",
        "LidoExecutionLayerRewardsVault": "solc8.9",
        "WithdrawalVault": "solc8.9",
        "WithdrawalQueueMock": "solc8.9"
    },
    "solc_optimize": "1000",
    "solc_via_ir": false,
    /*
    "solc_via_ir_map": {
        "LidoHarness": false,  // The `via_ir` option did not exist in solc 0.4.24
        // Compiling `Accounting` (and some others) without via-ir prevents the error below:
        // solc8.9 had an error: InternalCompilerError: Invalid stack item name: slot
        "AccountingHarness": false,
        "OracleReportSanityChecker": false,
        "WithdrawalQueueMock": false,
        "Burner": false,
        "LidoExecutionLayerRewardsVault": true,
        "WithdrawalVault": true,
        "LidoLocator": true
    },
    *.
    /*
    "prover_args": [
        "-allowArrayLengthUpdates true",
        "-cvlFunctionRevert false",
        "-summaryResolutionMode aggressive"
    ],
    */
    "parametric_contracts": ["AccountingHarness"],
    "rule_sanity": "basic",
    "verify": "AccountingHarness:certora/specs/core/Accounting.spec",
    "msg": "verify Accounting"
}
