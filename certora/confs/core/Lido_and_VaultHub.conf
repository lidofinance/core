        "VaultHubHarness:LIDO=LidoHarness",
        "VaultHubHarness:LIDO_LOCATOR=LidoLocator",
        "VaultHubHarness:CONSENSUS_CONTRACT=IHashConsensusMock"
    ],
    "struct_link": [
        "PredepositGuarantee:stakingVault=StakingVault"
    ],
    "packages": [
        "@aragon/minime=node_modules/@aragon/minime",
        "@aragon/apps-agent=node_modules/@aragon/apps-agent",
        "@aragon/id=node_modules/@aragon/id",
        "@openzeppelin/contracts-v5.2=node_modules/@openzeppelin/contracts-v5.2",
        "solhint=node_modules/solhint",
        "openzeppelin-solidity=node_modules/openzeppelin-solidity",
        "@aragon/os=node_modules/@aragon/os",
        "@aragon/apps-finance=node_modules/@aragon/apps-finance",
        "@openzeppelin/contracts=node_modules/@openzeppelin/contracts",
        "@aragon/apps-lido=node_modules/@aragon/apps-lido",
        "@openzeppelin/contracts-v4.4=node_modules/@openzeppelin/contracts-v4.4",
        "solhint-plugin-lido=node_modules/solhint-plugin-lido",
        "@aragon/apps-vault=node_modules/@aragon/apps-vault",
        "@openzeppelin/merkle-tree=node_modules/@openzeppelin/merkle-tree"
    ],
    "storage_extension_harnesses": [
        "PredepositGuarantee=StorageExtension",
        "OperatorGrid=StorageExtension",
        "StakingVault=StorageExtension",
        "VaultHubHarness=StorageExtension"
    ],
    "server": "prover",
    "global_timeout": "7200",
    "smt_timeout": "7200",
    "build_cache": true,
    "optimistic_fallback": true,
    "optimistic_hashing": true,
    "hashing_length_bound": "98",
    "optimistic_loop": true,
    "loop_iter": "2",
    "parametric_contracts": [
        "VaultHubHarness",
        "LidoHarness",
        "Accounting"
    ],
    "compiler_map": {
        "LidoHarness": "solc4.24",
        "Burner": "solc8.9",
        "Accounting": "solc8.9",
        "LidoLocator": "solc8.9",
        "LidoExecutionLayerRewardsVault": "solc8.9",
        "WithdrawalVault": "solc8.9",
        "VaultHubHarness": "solc8.25",
        "PredepositGuarantee": "solc8.25",
        "LazyOracle": "solc8.25",
        "OperatorGrid": "solc8.25",
        "StakingVault": "solc8.25",
        "IHashConsensusMock": "solc8.25",
        "PayableMock": "solc8.25",
        "StorageExtension": "solc8.25",
        "WithdrawableRequestMock": "solc8.25",
        "BLS12_381": "solc8.25"
    },
    "solc_optimize": "1000",
    "solc_via_ir_map": {
        "LidoHarness": false,  // The `via_ir` option did not exist in solc 0.4.24
        // Compiling `Burner` and `Accounting` without via-ir prevents the error below:
        // solc8.9 had an error: InternalCompilerError: Invalid stack item name: slot
        "Burner": false,
        "Accounting": false,
        "LidoExecutionLayerRewardsVault": true,
        "WithdrawalVault": true,
        "LidoLocator": true,
        "VaultHubHarness": true,
        "PredepositGuarantee": true,
        "LazyOracle": true,
        "OperatorGrid": true,
        "StakingVault": true,
        "IHashConsensusMock": true,
        "PayableMock": true,
        "StorageExtension": true,
        "WithdrawableRequestMock": true,
        "BLS12_381": true
    },
    "disallow_internal_function_calls": true, // speedup compilation
    // The prover_args are needed to avoid timeout in the following VaultHub functions:
    // applyVaultReport, resumeBeaconChainDeposits, settleVaultObligations.
    "prover_args": [
		"-split",
		"false"
	],
    "rule_sanity": "basic",
    "verify": "LidoHarness:certora/specs/core/Lido_and_VaultHub.spec",
    "msg": "verify joint Lido and VaultHub properties"
}
