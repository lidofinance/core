        "contracts/0.8.25/vaults/OperatorGrid.sol",
        "contracts/0.8.25/vaults/StakingVault.sol",  // NOTE: Can add more StakingVaults for comprehensive testing
        "contracts/common/lib/BLS.sol:BLS12_381",
        "certora/mocks/IHashConsensusMock.sol",
        "certora/mocks/PayableMock.sol",
        "certora/mocks/StorageExtension.sol",
