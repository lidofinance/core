    # Aragon ACL permission topology after the DG launch (mirrors
    # test/integration/dual-governance/dg-scratch.integration.ts)
    aragonAclDgPermissions:
      name: ACL
      address: *aragonAcl
      checks:
        hasInitialized: null
        getPermissionParamsLength: null
        evalParams: null
        NO_PERMISSION: null
        getEVMScriptExecutor: null
        getRecoveryVault: null
        CREATE_PERMISSIONS_ROLE: null
        allowRecoverability: null
        appId: null
        getInitializationBlock: null
        getPermissionParam: null
        canPerform: null
        getEVMScriptRegistry: null
        ANY_ENTITY: null
        EMPTY_PARAM_HASH: null
        kernel: null
        isPetrified: null
        BURN_ENTITY: null
        hasPermission:
          # AdminExecutor controls the Agent; Voting no longer does
          - args: [*dgAdminExecutor, *aragonAgent, *RUN_SCRIPT_ROLE]
            signature: "hasPermission(address,address,bytes32)"
            result: true
          - args: [*dgAdminExecutor, *aragonAgent, *EXECUTE_ROLE]
            signature: "hasPermission(address,address,bytes32)"
            result: true
          - args: [*aragonVoting, *aragonAgent, *RUN_SCRIPT_ROLE]
            signature: "hasPermission(address,address,bytes32)"
            result: false
          - args: [*aragonVoting, *aragonAgent, *EXECUTE_ROLE]
            signature: "hasPermission(address,address,bytes32)"
            result: false
          # ACL permission creation routed through Agent
          - args: [*aragonAgent, *aragonAcl, *CREATE_PERMISSIONS_ROLE]
            signature: "hasPermission(address,address,bytes32)"
            result: true
          - args: [*aragonVoting, *aragonAcl, *CREATE_PERMISSIONS_ROLE]
            signature: "hasPermission(address,address,bytes32)"
            result: false
        getPermissionManager:
          # Agent manages its own RUN_SCRIPT_ROLE / EXECUTE_ROLE
          - args: [*aragonAgent, *RUN_SCRIPT_ROLE]
            result: *aragonAgent
          - args: [*aragonAgent, *EXECUTE_ROLE]
            result: *aragonAgent
          - args: [*aragonAcl, *CREATE_PERMISSIONS_ROLE]
            result: *aragonAgent

