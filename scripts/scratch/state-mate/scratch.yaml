  - &SIMPLE_DVT_APP_ID "0xe1635b63b5f7b5e545f2a637558a4029dea7905361a2f0fc28c66e9136cf86a4"

  # --- Staking module type id ("curated-onchain-v1" right-padded) ---
  - &CURATED_ONCHAIN_V1_TYPE "0x637572617465642d6f6e636861696e2d76310000000000000000000000000000"

  # Deploy inputs with no on-chain getter on this protocol version, referenced
  # here so they are recorded in the check and the sibling-file usage invariant
  # holds (NodeOperatorsRegistry v4 deprecated the stuck penalty delay).
  - &unconsumedDeployInputs [*lidoApmEnsName, *norStuckPenaltyDelay, *sdvtStuckPenaltyDelay]

  # HashConsensus initialEpoch right after scratch deploy: "far future epoch"
  # derived from genesisTime: (2^64 - 1 - genesisTime) / (secondsPerSlot * slotsPerEpoch)
  - &HC_FAR_FUTURE_INITIAL_EPOCH 48038396021015343

