l1:
  rpcUrl: LOCAL_RPC_URL
  chainId: *chainId
  contracts:
    # ============================= Core protocol =============================
    lidoLocator:
      name: LidoLocator
      address: *lidoLocator
      proxyName: OssifiableProxy
      implementation: *lidoLocatorImplAddress
      proxyChecks:
        proxy__getAdmin: *aragonAgent
        proxy__getImplementation: *lidoLocatorImplAddress
        proxy__getIsOssified: false
      checks:
        accounting: *accounting
        accountingOracle: *accountingOracle
        burner: *burner
        coreComponents:
          - *executionLayerRewardsVault
          - *oracleReportSanityChecker
          - *stakingRouter
          - *aragonAgent
          - *withdrawalQueueERC721
          - *withdrawalVault
        depositSecurityModule: *depositSecurityModule
        elRewardsVault: *executionLayerRewardsVault
        lido: *lido
        operatorGrid: *operatorGrid
        oracleDaemonConfig: *oracleDaemonConfig
        oracleReportComponents:
          - *accountingOracle
          - *oracleReportSanityChecker
          - *burner
          - *withdrawalQueueERC721
          - *tokenRebaseNotifier
          - *stakingRouter
          - *vaultHub
        oracleReportSanityChecker: *oracleReportSanityChecker
        postTokenRebaseReceiver: *tokenRebaseNotifier
        predepositGuarantee: *predepositGuarantee
        lazyOracle: *lazyOracle
        triggerableWithdrawalsGateway: *triggerableWithdrawalsGateway
        validatorExitDelayVerifier: *validatorExitDelayVerifier
        vaultFactory: *stakingVaultFactory
        stakingRouter: *stakingRouter
        treasury: *aragonAgent
        validatorsExitBusOracle: *validatorsExitBusOracle
        vaultHub: *vaultHub
        withdrawalQueue: *withdrawalQueueERC721
        withdrawalVault: *withdrawalVault
        wstETH: *wstETH
      implementationChecks:
        # LidoLocator state is immutable — implementation answers identically
        lido: *lido
        treasury: *aragonAgent
        wstETH: *wstETH

    lido:
      name: Lido
      address: *lido
      proxyName: AppProxyUpgradeable
      implementation: *lidoImplAddress
      proxyChecks:
        proxyType: *PROXY_TYPE_APP_PROXY_UPGRADEABLE
        isDepositable: false
        implementation: *lidoImplAddress
        appId: *LIDO_APP_ID
        kernel: *aragonKernel
      checks:
        getPooledEthBySharesRoundUp: null
        totalSupply: null
        getSharesByPooledEth: null
        getEVMScriptExecutor: null
        DOMAIN_SEPARATOR: null
        getTotalPooledEther: null
        getBufferedEther: null
        getCurrentStakeLimit: null
        getExternalShares: null
        getStakeLimitFullInfo: null
        balanceOf: null
        getFeeDistribution: null
        getPooledEthByShares: null
        allowRecoverability: null
        nonces: null
        getMaxMintableExternalShares: null
        getInitializationBlock: null
        canPerform: null
        getBeaconStat: null
        allowance: null
        getExternalEther: null
        canDeposit: null
        getDepositableEther: null
        sharesOf: null
        getTotalELRewardsCollected: null
        name: *LIDO_NAME
        symbol: *LIDO_SYMBOL
        decimals: *DECIMALS_18
        hasInitialized: true
        isPetrified: false
        # Scratch deploy leaves the protocol stopped until the DAO resumes it
        isStopped: true
        isStakingPaused: true
        getContractVersion: 3
        getMaxExternalRatioBP: 0
        getLidoLocator: *lidoLocator
        getEIP712StETH: *eip712StETH
        getTreasury: *aragonAgent
        getRecoveryVault: *aragonAgent
        getWithdrawalCredentials: *lidoWithdrawalCredentials
        getEVMScriptRegistry: *aragonEvmScriptRegistry
        appId: *LIDO_APP_ID
        kernel: *aragonKernel
        getFee: 0
        getTotalShares: null # bootstrap-deposit dependent
        eip712Domain:
          - *LIDO_NAME
          - *EIP712_VERSION
          - *chainId
          - *lido
        STAKING_CONTROL_ROLE: *STAKING_CONTROL_ROLE
        STAKING_PAUSE_ROLE: *STAKING_PAUSE_ROLE
        RESUME_ROLE: *LIDO_RESUME_ROLE
        PAUSE_ROLE: *LIDO_PAUSE_ROLE
        UNSAFE_CHANGE_DEPOSITED_VALIDATORS_ROLE: *UNSAFE_CHANGE_DEPOSITED_VALIDATORS_ROLE
      implementationChecks:
        hasInitialized: false
        isPetrified: true
        appId: *ZERO_BYTES32
        kernel: *ZERO_ADDRESS
        getLidoLocator: *ZERO_ADDRESS
        getEIP712StETH: *ZERO_ADDRESS
        getContractVersion: *MAX_UINT256
        getInitializationBlock: *MAX_UINT256
        getTotalShares: 0

    wstETH:
      name: WstETH
      address: *wstETH
      checks:
        DOMAIN_SEPARATOR: null
        allowance: null
        balanceOf: null
        getStETHByWstETH: null
        getWstETHByStETH: null
        nonces: null
        stEthPerToken: null
        tokensPerStEth: null
        name: *WSTETH_NAME
        symbol: *WSTETH_SYMBOL
        decimals: *DECIMALS_18
        stETH: *lido
        totalSupply: 0

    eip712StETH:
      name: EIP712StETH
      address: *eip712StETH
      checks:
        domainSeparatorV4: null
        hashTypedDataV4: null
        eip712Domain:
          - args: [*lido]
            result:
              - *LIDO_NAME
              - *EIP712_VERSION
              - *chainId
              - *lido

    stakingRouter:
      name: StakingRouter
      address: *stakingRouter
      proxyName: OssifiableProxy
      implementation: *stakingRouterImplAddress
      proxyChecks:
        proxy__getAdmin: *aragonAgent
        proxy__getImplementation: *stakingRouterImplAddress
        proxy__getIsOssified: false
      checks:
        getAllNodeOperatorDigests: null
        getAllStakingModuleDigests: null
        getDepositsAllocation: null
        getNodeOperatorDigests: null
        getNodeOperatorSummary: null
        getRoleAdmin: null
        getRoleMember: null
        getRoleMemberCount: null
        getStakingFeeAggregateDistribution: null
        getStakingFeeAggregateDistributionE4Precision: null
        getStakingModule: null
        getStakingModuleActiveValidatorsCount: null
        getStakingModuleDigests: null
        getStakingModuleIsActive: null
        getStakingModuleIsDepositsPaused: null
        getStakingModuleIsStopped: null
        getStakingModuleLastDepositBlock: null
        getStakingModuleMaxDepositsCount: null
        getStakingModuleMaxDepositsPerBlock: null
        getStakingModuleMinDepositBlockDistance: null
        getStakingModuleNonce: null
        getStakingModuleStatus: null
        getStakingModuleSummary: null
        getStakingModules: null
        getStakingRewardsDistribution: null
        getTotalFeeE4Precision: null
        hasStakingModule: null
        supportsInterface: null
        getContractVersion: 3
        getLido: *lido
        DEPOSIT_CONTRACT: *depositContract
        getStakingModulesCount: 2
        getStakingModuleIds: [1, 2]
        getWithdrawalCredentials: *lidoWithdrawalCredentials
        FEE_PRECISION_POINTS: *FEE_PRECISION_POINTS
        TOTAL_BASIS_POINTS: *TOTAL_BASIS_POINTS
        MAX_STAKING_MODULES_COUNT: 32
        MAX_STAKING_MODULE_NAME_LENGTH: 31
        DEFAULT_ADMIN_ROLE: *ZERO_BYTES32
        MANAGE_WITHDRAWAL_CREDENTIALS_ROLE: *MANAGE_WITHDRAWAL_CREDENTIALS_ROLE
        REPORT_EXITED_VALIDATORS_ROLE: *REPORT_EXITED_VALIDATORS_ROLE
        REPORT_REWARDS_MINTED_ROLE: *REPORT_REWARDS_MINTED_ROLE
        STAKING_MODULE_MANAGE_ROLE: *STAKING_MODULE_MANAGE_ROLE
        STAKING_MODULE_UNVETTING_ROLE: *STAKING_MODULE_UNVETTING_ROLE
        UNSAFE_SET_EXITED_VALIDATORS_ROLE: *UNSAFE_SET_EXITED_VALIDATORS_ROLE
        REPORT_VALIDATOR_EXITING_STATUS_ROLE: *REPORT_VALIDATOR_EXITING_STATUS_ROLE
        REPORT_VALIDATOR_EXIT_TRIGGERED_ROLE: *REPORT_VALIDATOR_EXIT_TRIGGERED_ROLE
        hasRole:
          # deployer must hold no admin rights after the deploy
          - args: [*DEFAULT_ADMIN_ROLE, *deployer]
            result: false
      ozAcl:
        *DEFAULT_ADMIN_ROLE : [*aragonAgent]
        *MANAGE_WITHDRAWAL_CREDENTIALS_ROLE : []
        *REPORT_EXITED_VALIDATORS_ROLE : [*accountingOracle]
        *REPORT_REWARDS_MINTED_ROLE : [*lido, *accounting]
        *STAKING_MODULE_MANAGE_ROLE : [*aragonAgent]
        *STAKING_MODULE_UNVETTING_ROLE : [*depositSecurityModule]
        *UNSAFE_SET_EXITED_VALIDATORS_ROLE : []
        *REPORT_VALIDATOR_EXITING_STATUS_ROLE : [*validatorExitDelayVerifier]
        *REPORT_VALIDATOR_EXIT_TRIGGERED_ROLE : [*triggerableWithdrawalsGateway]
      implementationChecks:
        getContractVersion: *MAX_UINT256
        getStakingModulesCount: 0
        getWithdrawalCredentials: *ZERO_BYTES32
        DEPOSIT_CONTRACT: *depositContract

    executionLayerRewardsVault:
      name: LidoExecutionLayerRewardsVault
      address: *executionLayerRewardsVault
      checks:
        LIDO: *lido
        TREASURY: *aragonAgent

    withdrawalQueueERC721:
      name: WithdrawalQueueERC721
      address: *withdrawalQueueERC721
      proxyName: OssifiableProxy
      implementation: *withdrawalQueueERC721ImplAddress
      proxyChecks:
        proxy__getAdmin: *aragonAgent
        proxy__getImplementation: *withdrawalQueueERC721ImplAddress
        proxy__getIsOssified: false
      checks:
        balanceOf: null
        calculateFinalizationBatches: null
        findCheckpointHints: null
        getApproved: null
        getClaimableEther: null
        getLastCheckpointIndex: null
        getResumeSinceTimestamp: null
        getRoleAdmin: null
        getRoleMember: null
        getRoleMemberCount: null
        getWithdrawalRequests: null
        getWithdrawalStatus: null
        hasRole: null
        isApprovedForAll: null
        ownerOf: null
        prefinalize: null
        supportsInterface: null
        tokenURI: null
        unfinalizedRequestNumber: null
        unfinalizedStETH: null
        name: "Lido: stETH Withdrawal NFT"
        symbol: "unstETH"
        getBaseURI: ""
        getContractVersion: 1
        getLastRequestId: 0
        getLastFinalizedRequestId: 0
        getLockedEtherAmount: 0
